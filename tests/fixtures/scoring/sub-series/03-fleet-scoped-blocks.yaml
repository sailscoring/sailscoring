description: "Sub-series — a fleet-scoped block omits the other fleets"
rrs_notes: "RRS Appendix A applied per sub-series, over the sub-series' fleets only"
notes: |
  Two fleets share one three-race series: Cruisers (101, 102, 103) and
  Whitesails (201, 202). Every boat sails every race.

  Two scoring views over the same races:
    - "Overall" scores both fleets (no fleet scoping).
    - "Cruisers Championship" is scoped to the Cruisers fleet, so the
      Whitesails boats simply don't appear in it — they aren't scored and
      wouldn't get a published page for that view.

  The Cruisers standings are identical in both views (same races, same
  fleet); the point is that fleet-scoping drops the other fleet entirely
  rather than scoring it into an unwanted table.

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Cruiser One"
    fleet: "Cruisers"
  - sailNumber: "102"
    name: "Cruiser Two"
    fleet: "Cruisers"
  - sailNumber: "103"
    name: "Cruiser Three"
    fleet: "Cruisers"
  - sailNumber: "201"
    name: "White One"
    fleet: "Whitesails"
  - sailNumber: "202"
    name: "White Two"
    fleet: "Whitesails"

subSeriesConfig:
  - name: "Cruisers Championship"
    fleets: ["Cruisers"]

races:
  - number: 1
    subSeries: ["Overall", "Cruisers Championship"]
    finishes:
      - { sailor: "101", position: 1 }
      - { sailor: "201", position: 2 }
      - { sailor: "102", position: 3 }
      - { sailor: "202", position: 4 }
      - { sailor: "103", position: 5 }
  - number: 2
    subSeries: ["Overall", "Cruisers Championship"]
    finishes:
      - { sailor: "102", position: 1 }
      - { sailor: "101", position: 2 }
      - { sailor: "202", position: 3 }
      - { sailor: "201", position: 4 }
      - { sailor: "103", position: 5 }
  - number: 3
    subSeries: ["Overall", "Cruisers Championship"]
    finishes:
      - { sailor: "101", position: 1 }
      - { sailor: "103", position: 2 }
      - { sailor: "102", position: 3 }
      - { sailor: "201", position: 4 }
      - { sailor: "202", position: 5 }

