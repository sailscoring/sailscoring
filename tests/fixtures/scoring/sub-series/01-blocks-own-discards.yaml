description: "Sub-series — two blocks, each with its own discards and entrants"
rrs_notes: "RRS Appendix A2.1 (discards) and A5 applied per sub-series"
notes: |
  One six-race series split into two sub-series: Winter (races 1–4) and
  Spring (races 5–6). Each block is scored independently with the series
  discard rule — 1 discard from 4 races sailed — applied to the block's own
  race count: Winter gets one discard, Spring (2 races) gets none.

  Entrants are per block, because excludeDncOnlyCompetitors is set. Emma sails
  only Winter, so she is all-DNC across Spring and is dropped from the Spring
  standings. Brian enters Spring (he sails race 6) but misses race 5; his
  race-5 DNC scores Spring entrants + 1 = 5, based on the four boats that took
  part in the block — not the five-boat series entry list. (Without the flag a
  sub-series scores all-DNC boats like a plain series: Emma would appear in
  Spring as DNC and Brian's race-5 DNC would be 6.)

series:
  discardThresholds:
    - minRaces: 4
      discardCount: 1
  excludeDncOnlyCompetitors: true

competitors:
  - sailNumber: "1"
    name: "Aoife"
  - sailNumber: "2"
    name: "Brian"
  - sailNumber: "3"
    name: "Ciara"
  - sailNumber: "4"
    name: "Dara"
  - sailNumber: "5"
    name: "Emma"

races:
  - number: 1
    subSeries: "Winter"
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 3 }
      - { sailor: "4", position: 4 }
      - { sailor: "5", position: 5 }
  - number: 2
    subSeries: "Winter"
    finishes:
      - { sailor: "2", position: 1 }
      - { sailor: "1", position: 2 }
      - { sailor: "4", position: 3 }
      - { sailor: "3", position: 4 }
      - { sailor: "5", position: 5 }
  - number: 3
    subSeries: "Winter"
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 3 }
      - { sailor: "5", position: 4 }
      - { sailor: "4", position: 5 }
  - number: 4
    subSeries: "Winter"
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "3", position: 2 }
      - { sailor: "4", position: 3 }
      - { sailor: "2", position: 4 }
  - number: 5
    subSeries: "Spring"
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "3", position: 2 }
      - { sailor: "4", position: 3 }
  - number: 6
    subSeries: "Spring"
    finishes:
      - { sailor: "2", position: 1 }
      - { sailor: "1", position: 2 }
      - { sailor: "3", position: 3 }
      - { sailor: "4", position: 4 }

