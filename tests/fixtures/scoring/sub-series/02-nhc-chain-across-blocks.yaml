description: "Sub-series — NHC ratings chain across the block boundary"
rrs_notes: "SWNHC2015 progressive handicap; blocks scored independently per RRS Appendix A"
notes: |
  The Sailwave-verified Howth 17 HPH fleet from the NHC examples (races 1–3,
  see nhc/07), split into two sub-series: Early (races 1–2) and Late (race 3).

  Late is set to *continue* Early's chain (an explicit per-sub-series carry),
  so the two blocks reproduce one chain spanning all three races. The Late
  block's applied TCFs are the ratings carried out of race 2 — e.g. Isobel
  (19) sails race 3 on 1.299, exactly as in the unsplit series — and every
  per-race rating matches the values Sailwave prints for the whole series
  (the per-race arithmetic is on the nhc/07 page). Only the points
  aggregation is per block.

  Entrants are per block, because excludeDncOnlyCompetitors is set. Gladys (14)
  is DNC throughout and appears in neither block. Leila (3) starts race 1 but
  retires (DNF), which makes her an Early entrant — her race-1 DNF and race-2
  DNC score Early entrants + 1 = 10, from the nine boats that took part in the
  block, not the ten-boat series entry list. In Late, only the seven race-3
  finishers are entrants. (Without the flag, Gladys would appear in both blocks
  as DNC, as she would in a plain series.)

series:
  discardThresholds: []
  excludeDncOnlyCompetitors: true

# Late continues Early's chain (explicit per-sub-series carry).
subSeriesCarryChain: true

