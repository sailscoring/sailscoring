description: "Sub-series — a race struck for one fleet only (single-competitor heat)"
rrs_notes: "Per-fleet race exclusion; the heat is dropped from the affected fleet's points, race count, and discards"
notes: |
  Two fleets share one three-race series: Class A (301, 302) and Class B
  (401, 402, 403). They race together, scored separately.

  Race 2 drew only one Class A boat (301), so under the SIs the heat is
  struck for Class A — it doesn't count for that fleet at all. Class B had
  a full turnout, so race 2 counts for them normally.

  Modelled as a per-fleet exclusion of race 2 for Class A in the "Overall"
  sub-series. Like an abandoned heat, race 2 stays a column for Class A but
  scores 0 and earns no discard credit:
    - 301's win there scores 0, and 302 (which sat it out) takes no penalty.
    - Class B scores all three races normally.
  The race stays in the sub-series; only Class A is struck from it.

series:
  discardThresholds: []

competitors:
  - sailNumber: "301"
    name: "Alpha One"
    fleet: "Class A"
  - sailNumber: "302"
    name: "Alpha Two"
    fleet: "Class A"
  - sailNumber: "401"
    name: "Bravo One"
    fleet: "Class B"
  - sailNumber: "402"
    name: "Bravo Two"
    fleet: "Class B"
  - sailNumber: "403"
    name: "Bravo Three"
    fleet: "Class B"

subSeriesConfig:
  - name: "Overall"
    exclude:
      - { race: 2, fleet: "Class A" }

races:
  - number: 1
    subSeries: "Overall"
    finishes:
      - { sailor: "301", position: 1 }
      - { sailor: "401", position: 2 }
      - { sailor: "302", position: 3 }
      - { sailor: "402", position: 4 }
      - { sailor: "403", position: 5 }
  - number: 2
    subSeries: "Overall"
    finishes:
      - { sailor: "301", position: 1 }
      - { sailor: "401", position: 2 }
      - { sailor: "402", position: 3 }
      - { sailor: "403", position: 4 }
  - number: 3
    subSeries: "Overall"
    finishes:
      - { sailor: "301", position: 1 }
      - { sailor: "402", position: 2 }
      - { sailor: "302", position: 3 }
      - { sailor: "401", position: 4 }
      - { sailor: "403", position: 5 }

