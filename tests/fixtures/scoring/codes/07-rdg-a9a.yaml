description: "RDG (Redress Given) — A9(a) average of all races in the series"
rrs_notes: >
  RRS A9(a): redress score is the average of the competitor's scores in all other
  races in the series, rounded to the nearest tenth (0.05 rounds up).
  4 competitors, N=4, DNF score=5.
  Alice (sail 1) fails to finish race 2 and is granted redress under A9(a).
  Alice's scores in other races: race 1 = 1 pt (1st), race 3 = 2 pt (2nd).
  Average = (1 + 2) / 2 = 1.5 → rounded to 1.5.
  Final: Bob 4 pts (rank 1), Alice 4.5 pts (rank 2), Carol 8 pts, Dave 11 pts.

