  discardThresholds: []

competitors:
  - { sailNumber: "1", name: "Alice" }
  - { sailNumber: "2", name: "Bob" }
  - { sailNumber: "3", name: "Carol" }

races:
  - number: 1
    finishes:
      - { sailor: "1", position: 2 }
      - { sailor: "2", position: 1 }
      - { sailor: "3", position: 3 }
  - number: 2
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "2", position: 2 }
