description: "RDG (Redress Given) — A9(b) average of races before the redress race"
rrs_notes: >
  RRS A9(b): redress score is the average of the competitor's scores in races
  sailed before the race in which redress is granted, rounded to the nearest
  tenth (0.05 rounds up).
  3 competitors, N=3, DNF score=4.
  Alice (sail 1) fails to finish race 3 and is granted redress under A9(b).
  Races before race 3: race 1 (2 pts, 2nd), race 2 (1 pt, 1st).
  Average = (2 + 1) / 2 = 1.5 → rounded to 1.5.
  With A9(a) the pool would include race 4 (2 pts) giving avg (2+1+2)/3=1.7 — different.
  Final: Bob 5 pts (rank 1), Alice 6.5 pts (rank 2), Carol 11 pts (rank 3).

