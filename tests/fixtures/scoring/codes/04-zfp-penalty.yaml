description: "ZFP (Z Flag Penalty) adds 20% of DNF score to finish place"
rrs_notes: >
  RRS 30.2 (Z Flag Rule): a boat in the triangle zone during the last minute
  before the start is penalised without a hearing. Per rule 44.3(c) the score
  becomes the finishing place plus 20% of the DNF score, rounded to the nearest
  tenth of a point (0.05 up), but not more than the DNF score. 44.3(c): other
  boats' scores are unchanged (duplicate scores are permitted).
  5 competitors, N=5, DNF score=6.
  ZFP adds 0.20 × 6 = 1.2 points (already a tenth).
  Alice finishes 1st + ZFP → 1 + 1.2 = 2.2.
  Bob finishes 2nd → 2 (unchanged).
  Carol finishes 3rd → 3.
  Dave finishes 4th → 4.
  Eve finishes 5th → 5.

series:
  discardThresholds: []

competitors:
  - { sailNumber: "1", name: "Alice" }
  - { sailNumber: "2", name: "Bob" }
  - { sailNumber: "3", name: "Carol" }
  - { sailNumber: "4", name: "Dave" }
  - { sailNumber: "5", name: "Eve" }

races:
  - number: 1
    finishes:
      - { sailor: "1", position: 1, penaltyCode: ZFP }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 3 }
      - { sailor: "4", position: 4 }
      - { sailor: "5", position: 5 }

