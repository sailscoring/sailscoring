description: "RDG (Redress Given) — pool restriction: exclude mode, and finisher RDG"
rrs_notes: >
  Tests two RDG features together:
  (1) Pool restriction — exclude mode: specific races are removed from the
      A9(a) default pool (all races except the current one). Alice had a bad
      race 1 (3rd out of 3), which is excluded from her RDG average.
  (2) Finisher RDG: Alice recorded a finish position (3rd) in race 3 but the
      PC grants redress replacing her score. The finish position is kept in
      the record but the redress score is used for standings.
  3 competitors, N=3, DNF score=4.
  Alice (sail 1) finishes 3rd in race 3 and is granted redress A9(a) excluding race 1.
  Pool = all races except race 3 itself and race 1 (excluded) = races 2 and 4.
  Alice's scores in races 2 and 4: 1 pt each. Average = (1 + 1) / 2 = 1.0.
  Without the exclusion the pool would be [3, 1, 1] = avg 5/3 = 1.7.
  Final: Alice 6.0 pts (rank 1), Bob 7 pts (rank 2), Carol 9 pts (rank 3).

series:
  discardThresholds: []

competitors:
  - { sailNumber: "1", name: "Alice" }
  - { sailNumber: "2", name: "Bob" }
  - { sailNumber: "3", name: "Carol" }

races:
  - number: 1
    finishes:
      - { sailor: "1", position: 3 }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 1 }
  - number: 2
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 3 }
  - number: 3
    finishes:
      - { sailor: "1", position: 3, code: RDG, redressMethod: all_races, redressExcludeRaces: [1] }
      - { sailor: "2", position: 1 }
      - { sailor: "3", position: 2 }
  - number: 4
    finishes:
      - { sailor: "1", position: 1 }
      - { sailor: "2", position: 2 }
      - { sailor: "3", position: 3 }

expected:
  standings:
    - rank: 1
      sailor: "1"
      racePoints: [3, 1, 1.0, 1]
      raceCodes: [null, null, RDG, null]
      raceDiscards: [false, false, false, false]
      raceRedressFlags: [false, false, true, false]
      totalPoints: 6.0
      netPoints: 6.0
    - rank: 2
      sailor: "2"
      racePoints: [2, 2, 1, 2]
      raceCodes: [null, null, null, null]
      raceDiscards: [false, false, false, false]
      totalPoints: 7
      netPoints: 7
    - rank: 3
      sailor: "3"
      racePoints: [1, 3, 2, 3]
      raceCodes: [null, null, null, null]
      raceDiscards: [false, false, false, false]
      totalPoints: 9
      netPoints: 9
