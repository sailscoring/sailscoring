description: "NHC1 — per-fleet profile override (aggressive blend rates)"
notes: |
  Same 4 boats and finish times as fixture 04 race 1, but with a per-fleet
  `nhcProfile` override that doubles the over-performer blend rate (α_p
  0.30 → 0.50) and the under-performer rate (α_n 0.15 → 0.30), with the
  extreme rates halved in turn (α_px 0.15 → 0.25, α_nx 0.075 → 0.15).

  Demonstrates that `Fleet.nhcProfile` overrides the engine's stock
  `DEFAULT_NHC_PROFILE` constant per fleet. Compare to the race-1 output
  in `04-multi-race-propagation.yaml`:

  | Boat  | Q/H class    | Default newTcf | Aggressive newTcf |
  |-------|--------------|----------------|-------------------|
  | Alpha | non-ext over | 1.015          | 1.063             |
  | Beta  | non-ext over | 0.994          | 0.994             |
  | Gamma | non-ext under| 1.016          | 0.987             |
  | Delta | extreme slow | 1.075          | 1.056             |

  σ thresholds and `minFin` carry forward unchanged from the stock
  profile, so the extreme classification matches fixture 04 (Delta is
  the only extreme slow boat). This is part of #143 — HYC's
  aggressive-vs-standard blend experiment.

series:
  discardThresholds: []

fleet:
  scoringSystem: nhc
  nhcProfile:
    name: "NHC1 (aggressive)"
    alphaP: 0.50
    alphaN: 0.30
    alphaPX: 0.25
    alphaNX: 0.15
    sdOver: 1.5
    sdUnder: 1.0
    minFin: 3

