description: "NHC1 — competitor without starting TCF is rejected; sub-MinFin suppresses update"
notes: |
  3 boats; one (Gamma) has no nhcStartingTcf at all and must be rejected
  with reason 'no_starting_tcf'.

  After rejection, only 2 boats race — under SWNHC2015's MinFin = 3 the
  rating update is suppressed for the whole fleet. Alpha and Beta keep
  their starting TCF (1.000) unchanged, and the aggregate fields
  (p50, σ, etc.) report defaults with updateSuppressed = true.

series:
  discardThresholds: []

fleet:
  scoringSystem: nhc

competitors:
  - sailNumber: "1"
    name: "Alpha"
    nhcStartingTcf: 1.000
  - sailNumber: "2"
    name: "Beta"
    nhcStartingTcf: 1.000
  - sailNumber: "3"
    name: "Gamma"
    # no nhcStartingTcf — must be rejected

races:
  - number: 1
    startTime: "14:00:00"
    finishes:
      - sailor: "1"
        finishTime: "14:50:00"
      - sailor: "2"
        finishTime: "15:00:00"
      - sailor: "3"
        finishTime: "15:05:00"
    aggregates:
      finisherCount: 2
      ctAvg: 3300.0
      meanTcf: 1.0
      updateSuppressed: true
      extremeCount: 0
      realignmentFactor: 1.0
    expected:
      - sailor: "1"
        rank: 1
        points: 1.0
        elapsedTime: 3000
        correctedTime: 3000.0
        tcfApplied: 1.0
        newTcf: 1.0
      - sailor: "2"
        rank: 2
        points: 2.0
        elapsedTime: 3600
        correctedTime: 3600.0
        tcfApplied: 1.0
        newTcf: 1.0
    rejected:
      - sailor: "3"
        reason: "no_starting_tcf"

expected:
  standings:
    - rank: 1
      sailor: "1"
      racePoints: [1]
      raceCodes: [null]
      raceDiscards: [false]
      totalPoints: 1
      netPoints: 1
    - rank: 2
      sailor: "2"
      racePoints: [2]
      raceCodes: [null]
      raceDiscards: [false]
      totalPoints: 2
      netPoints: 2
