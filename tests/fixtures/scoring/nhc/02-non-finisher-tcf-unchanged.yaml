description: "NHC1 — non-finisher carries TCF unchanged into next race"
notes: |
  Same setup as 01 plus a 5th boat (Echo, TCF 0.98) that DNFs.

  Echo is excluded from CT_avg, mean(TCF), and finisherCount.
  Echo's newTcf must equal its tcfApplied (0.98) — unchanged.
  Echo gets penalty points = fleet entries + 1 = 6.

  Aggregates and other boats unchanged from 01.

series:
  discardThresholds: []

fleet:
  scoringSystem: nhc
  alpha: 0.15

competitors:
  - sailNumber: "1"
    name: "Alpha"
    nhcStartingTcf: 0.950
  - sailNumber: "2"
    name: "Beta"
    nhcStartingTcf: 1.000
  - sailNumber: "3"
    name: "Gamma"
    nhcStartingTcf: 1.050
  - sailNumber: "4"
    name: "Delta"
    nhcStartingTcf: 1.100
  - sailNumber: "5"
    name: "Echo"
    nhcStartingTcf: 0.980

