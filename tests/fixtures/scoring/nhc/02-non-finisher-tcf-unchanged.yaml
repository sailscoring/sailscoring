  Echo is excluded from CT_avg, mean(TCF), and finisherCount, so the
  fleet aggregates and other boats' values are identical to fixture 01.
  Echo's newTcf must equal its tcfApplied (0.98) — unchanged.
  Echo gets penalty points = fleet entries + 1 = 6.

