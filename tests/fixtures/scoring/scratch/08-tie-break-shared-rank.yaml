description: "Scratch — perfectly tied boats share a rank; next boat gets rank after both"
rrs_notes: >
  RRS A8.1: When boats finish simultaneously they share the averaged points for the
  places they occupy.
  RRS A8.2: If no tie-break procedure separates two boats, they share the same rank.
  The next boat below them is assigned the rank after both tied boats.

  Alice and Bob cross the line together in every race (equal sortOrder at
  position 2, with no boat recorded at position 1). Under RRS A8.1 they occupy
  fleet ranks 1 and 2, each scoring (1+2)/2 = 1.5 per race. Carol is third in
  fleet (position 4 → fleet rank 3) scoring 3 per race.

  Their series scores are identical so no tie-break (RRS A8.2) can separate them;
  they share rank 1. Carol gets rank 3 (not rank 2).

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"

# Alice and Bob cross the line together in every race (tied at position 2, fleet ranks 1 & 2).
# Each scores (1+2)/2 = 1.5 per race. Carol is 3rd in fleet (position 4 → rank 3) scoring 3.
#
# Alice: 1.5, 1.5 → 3 pts total
# Bob:   1.5, 1.5 → 3 pts total  ← unresolvable tie with Alice
# Carol: 3,   3   → 6 pts total
#
# Expected: Alice and Bob both get rank 1. Carol gets rank 3 (not rank 2).
races:
  - number: 1
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
        tiedWithPrevious: true
      - sailor: "303"
        position: 3

  - number: 2
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
        tiedWithPrevious: true
      - sailor: "303"
        position: 3

expected:
  standings:
    - rank: 1
      sailor: "101"
      racePoints: [1.5, 1.5]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 3
      netPoints: 3

    - rank: 1
      sailor: "202"
      racePoints: [1.5, 1.5]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 3
      netPoints: 3

    - rank: 3
      sailor: "303"
      racePoints: [3, 3]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 6
      netPoints: 6
