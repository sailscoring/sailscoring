description: "Scratch — perfectly tied boats share a rank; next boat gets rank after both"
rrs_notes: >
  RRS A8.2: If no tie-break procedure separates two boats, they share the same rank.
  The next boat below them is assigned the rank after both tied boats, not the rank
  immediately after the tie.
  A finish recorder who sees two boats cross the line together records them at the same
  position. If this happens in every race of the series, no tie-break procedure can
  separate them and they share the rank.

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"

# Alice and Bob cross the line together in every race and are recorded at the same position.
# Their scores are identical in every race, so no tie-break procedure can separate them.
# Carol consistently finishes further back.
#
# Alice: 2, 2 → 4 pts total
# Bob:   2, 2 → 4 pts total  ← unresolvable tie with Alice
# Carol: 4, 4 → 8 pts total
#
# Expected: Alice and Bob both get rank 1. Carol gets rank 3 (not rank 2).
races:
  - number: 1
    finishes:
      - sailor: "101"
        position: 2
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 4

  - number: 2
    finishes:
      - sailor: "101"
        position: 2
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 4

expected:
  standings:
    - rank: 1
      sailor: "101"
      racePoints: [2, 2]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 4
      netPoints: 4

    - rank: 1
      sailor: "202"
      racePoints: [2, 2]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 4
      netPoints: 4

    - rank: 3
      sailor: "303"
      racePoints: [4, 4]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 8
      netPoints: 8
