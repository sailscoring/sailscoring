description: "Scratch — RRS A8.1 cannot separate, so RRS A8.2 last-race countback decides"
rrs_notes: >
  RRS A8.1 then A8.2. Alice and Bob each score 8 points with identical sorted
  score lists ([1, 2, 5] each), so A8.1 cannot separate them. A8.2 then ranks by
  the last race (both DNC, equal), then the next-to-last race (race 2), where
  Bob finished 1st and Alice 2nd: Bob ranks ahead. These countback scores are
  used even though one of them (the DNC) would be discarded — A8.2 includes
  excluded scores.

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"
  - sailNumber: "404"
    name: "David"

# 4 boats, N+1 = 5.
#
# Alice: 1st, 2nd, DNC → 1+2+5=8  sorted best-to-worst [1, 2, 5]
# Bob:   2nd, 1st, DNC → 2+1+5=8  sorted best-to-worst [1, 2, 5] ← identical to Alice
# Carol: 3rd, 3rd, 1st → 3+3+1=7  (wins outright)
# David: 4th, 4th, 2nd → 4+4+2=10
#
# Tie-break (Alice vs Bob):
#   A8.1 — sorted scores [1,2,5] vs [1,2,5] → identical, cannot separate
#   A8.2 — last race (race 3): Alice=5, Bob=5 → equal
#          next-to-last race (race 2): Alice=2, Bob=1 → Bob wins
races:
  - number: 1
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 3
      - sailor: "404"
        position: 4

  - number: 2
    finishes:
      - sailor: "202"
        position: 1
      - sailor: "101"
        position: 2
      - sailor: "303"
        position: 3
      - sailor: "404"
        position: 4

  - number: 3
    # Alice and Bob both DNC; Carol wins, David 2nd
    finishes:
      - sailor: "303"
        position: 1
      - sailor: "404"
        position: 2
      - sailor: "101"
        code: DNC
      - sailor: "202"
        code: DNC

expected:
  standings:
    - rank: 1
      sailor: "303"
      racePoints: [3, 3, 1]
      raceCodes: [null, null, null]
      raceDiscards: [false, false, false]
      totalPoints: 7
      netPoints: 7

    - rank: 2
      sailor: "202"
      racePoints: [2, 1, 5]
      raceCodes: [null, null, "DNC"]
      raceDiscards: [false, false, false]
      totalPoints: 8
      netPoints: 8

    - rank: 3
      sailor: "101"
      racePoints: [1, 2, 5]
      raceCodes: [null, null, "DNC"]
      raceDiscards: [false, false, false]
      totalPoints: 8
      netPoints: 8

    - rank: 4
      sailor: "404"
      racePoints: [4, 4, 2]
      raceCodes: [null, null, null]
      raceDiscards: [false, false, false]
      totalPoints: 10
      netPoints: 10
