description: "Scratch — A5.3 with DNC scored from the starting area (DBSC SI A13.2)"
rrs_notes: >
  DBSC Sailing Instruction A13.2 changes RRS A5.3 so that a boat that did not
  come to the starting area (DNC) is also scored the number of boats that came
  to the starting area plus one — not series entries + 1. This is the
  'startingAreaInclDnc' mode. Contrast 09-a53-starting-area, which is identical
  except DNC keeps the entries + 1 base.
  Race 2 has only 3 boats in the starting area: starting-area penalty = 4, and
  under this mode DNC scores 4 as well (instead of series entries + 1 = 6).

series:
  discardThresholds: []
  dnfScoring: startingAreaInclDnc

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"
  - sailNumber: "404"
    name: "David"
  - sailNumber: "505"
    name: "Eve"

races:
  - number: 1
    # All 5 boats finish cleanly
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 3
      - sailor: "404"
        position: 4
      - sailor: "505"
        position: 5

  - number: 2
    # Only Alice, Bob, Carol come to the starting area (startPresent: true).
    # David and Eve do not appear (implicit DNC).
    # came = 3 → starting-area penalty = 4. Under startingAreaInclDnc the
    # implicit DNCs (David, Eve) also score 4, not 6.
    finishes:
      - sailor: "101"
        code: DNF
        startPresent: true
      - sailor: "202"
        code: OCS
        startPresent: true
      - sailor: "303"
        position: 1
        startPresent: true
      # David ("404") and Eve ("505") have no record — implicit DNC, score 4

# Points summary (starting-area penalty = 4 for DNF/OCS *and* DNC):
#   Carol:  3 + 1 = 4    (3rd in race 1, 1st in race 2)
#   Alice:  1 + 4 = 5    (1st in race 1, DNF in race 2)
#   Bob:    2 + 4 = 6    (2nd in race 1, OCS in race 2)
#   David:  4 + 4 = 8    (4th in race 1, DNC in race 2 — came + 1, not entries + 1)
#   Eve:    5 + 4 = 9    (5th in race 1, DNC in race 2 — came + 1)
expected:
  standings:
    - rank: 1
      sailor: "303"
      racePoints: [3, 1]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 4
      netPoints: 4

    - rank: 2
      sailor: "101"
      racePoints: [1, 4]
      raceCodes: [null, "DNF"]
      raceDiscards: [false, false]
      totalPoints: 5
      netPoints: 5

    - rank: 3
      sailor: "202"
      racePoints: [2, 4]
      raceCodes: [null, "OCS"]
      raceDiscards: [false, false]
      totalPoints: 6
      netPoints: 6

    - rank: 4
      sailor: "404"
      racePoints: [4, 4]
      raceCodes: [null, "DNC"]
      raceDiscards: [false, false]
      totalPoints: 8
      netPoints: 8

    - rank: 5
      sailor: "505"
      racePoints: [5, 4]
      raceCodes: [null, "DNC"]
      raceDiscards: [false, false]
      totalPoints: 9
      netPoints: 9
