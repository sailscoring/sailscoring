description: "Scratch — 5 boats, 3 races, all finish, no discards, no tie-breaks"
rrs_notes: >
  RRS A5.1 (Low Point): a boat's score in a race is the finishing position within the fleet.
  The series score is the sum of race scores. Lowest score wins.

series:
  discardThresholds: []

competitors:
