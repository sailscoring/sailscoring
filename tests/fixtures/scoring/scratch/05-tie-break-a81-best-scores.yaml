description: "Scratch — series tie broken by RRS A8.1 (sorted race scores)"
rrs_notes: >
  RRS A8.1: when boats are tied on net points, each boat's race scores are
  listed best-to-worst (excluding discards) and the tie is broken at the first
  point of difference in favour of the better score.
  Alice and Bob both score 5 net points. Best-to-worst, Alice is [1, 1, 3] and
  Bob is [1, 2, 2]; their best scores tie at 1, but Alice's second-best 1 beats
  Bob's 2, so Alice ranks ahead.

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"

# Alice: 1st, 3rd, 1st  → 5 pts, sorted best-to-worst [1, 1, 3]
# Bob:   2nd, 1st, 2nd  → 5 pts, sorted best-to-worst [1, 2, 2]
# Carol: 3rd, 2nd, 3rd  → 8 pts
races:
  - number: 1
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 3

  - number: 2
    # Bob wins; Alice struggles
    finishes:
      - sailor: "202"
        position: 1
      - sailor: "303"
        position: 2
      - sailor: "101"
        position: 3

  - number: 3
    # Alice wins again; Bob 2nd
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 3

# Alice and Bob both total 5. A8.1: [1,1,3] vs [1,2,2] — equal at the best score,
# Alice's second-best 1 beats Bob's 2 → Alice wins.
expected:
  standings:
    - rank: 1
      sailor: "101"
      racePoints: [1, 3, 1]
      raceCodes: [null, null, null]
      raceDiscards: [false, false, false]
      totalPoints: 5
      netPoints: 5

    - rank: 2
      sailor: "202"
      racePoints: [2, 1, 2]
      raceCodes: [null, null, null]
      raceDiscards: [false, false, false]
      totalPoints: 5
      netPoints: 5

    - rank: 3
      sailor: "303"
      racePoints: [3, 2, 3]
      raceCodes: [null, null, null]
      raceDiscards: [false, false, false]
      totalPoints: 8
      netPoints: 8
