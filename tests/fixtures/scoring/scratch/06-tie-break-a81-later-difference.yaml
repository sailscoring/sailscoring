description: "Scratch — RRS A8.1 tie broken at the third-best score"
rrs_notes: >
  RRS A8.1: list each boat's race scores best-to-worst (excluding discards) and
  break the tie at the first point of difference.
  Alice and Bob both score 10 net points. Best-to-worst, Alice is [1, 2, 2, 5]
  and Bob is [1, 2, 3, 4]; they tie at the first two positions, then Alice's
  third-best 2 beats Bob's 3, so Alice ranks ahead.

series:
  discardThresholds: []

competitors:
  - sailNumber: "101"
    name: "Alice"
  - sailNumber: "202"
    name: "Bob"
  - sailNumber: "303"
    name: "Carol"
  - sailNumber: "404"
    name: "David"

# 4 boats, so N+1 = 5 (DNC penalty).
#
# Alice: 1st, 2nd, 2nd, DNC → 1+2+2+5=10   best-to-worst [1, 2, 2, 5]
# Bob:   2nd, 1st, 4th, 3rd → 2+1+4+3=10   best-to-worst [1, 2, 3, 4]
# Carol: 3rd, 3rd, 1st, 2nd → 3+3+1+2=9    lower total, ranks 1st outright
# David: 4th, 4th, 3rd, 1st → 4+4+3+1=12
#
# Carol wins outright (9 < 10). Alice and Bob tied at 10.
# A8.1: [1,2,2,5] vs [1,2,3,4] — equal at the first two positions, then Alice's
# third-best 2 beats Bob's 3 → Alice wins.
races:
  - number: 1
    finishes:
      - sailor: "101"
        position: 1
      - sailor: "202"
        position: 2
      - sailor: "303"
        position: 3
      - sailor: "404"
        position: 4

  - number: 2
    finishes:
      - sailor: "202"
        position: 1
      - sailor: "101"
        position: 2
      - sailor: "303"
        position: 3
      - sailor: "404"
        position: 4

  - number: 3
    finishes:
      - sailor: "303"
        position: 1
      - sailor: "101"
        position: 2
      - sailor: "404"
        position: 3
      - sailor: "202"
        position: 4

  - number: 4
    # Alice gets DNC (N+1 = 5 pts); Carol 2nd, Bob 3rd
    finishes:
      - sailor: "404"
        position: 1
      - sailor: "303"
        position: 2
      - sailor: "202"
        position: 3
      - sailor: "101"
        code: DNC

expected:
  standings:
    - rank: 1
      sailor: "303"
      racePoints: [3, 3, 1, 2]
      raceCodes: [null, null, null, null]
      raceDiscards: [false, false, false, false]
      totalPoints: 9
      netPoints: 9

    - rank: 2
      sailor: "101"
      racePoints: [1, 2, 2, 5]
      raceCodes: [null, null, null, "DNC"]
      raceDiscards: [false, false, false, false]
      totalPoints: 10
      netPoints: 10

    - rank: 3
      sailor: "202"
      racePoints: [2, 1, 4, 3]
      raceCodes: [null, null, null, null]
      raceDiscards: [false, false, false, false]
      totalPoints: 10
      netPoints: 10

    - rank: 4
      sailor: "404"
      racePoints: [4, 4, 3, 1]
      raceCodes: [null, null, null, null]
      raceDiscards: [false, false, false, false]
      totalPoints: 12
      netPoints: 12
