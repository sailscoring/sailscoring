description: "IRC — RDG average excluding DNC up to the discard limit (handicap path)"
rrs_notes: >
  Redress in a handicap (IRC) fleet, HalSail RDG type 2. Until now redress was
  only resolved for scratch fleets; this exercises the handicap standings path.
  All boats race TCC 1.0 so corrected time = elapsed and places follow finish
  order. 4 boats (N=4 → DNC = 5), 4 races → 1 discard allowed.
  Alice is granted redress in race 4. Other races: R1 DNC (5), R2 DNC (5),
  R3 = 2. One DNC excluded (allowance 1), the other kept → mean(5, 2) = 3.5.

