description: "VPRS — mid-series TCC change via per-race rating override"
rrs_notes: >
  A VPRS boat can be re-measured part-way through a series (a new certificate).
  The competitor keeps its *current* TCC; earlier races are pinned to the old
  value with a per-race rating override on the vprsTcc field — exactly the IRC
  mechanism. Here Zelus races on TCC 1.000 in race 1 (override) and on its
  current TCC 0.900 in race 2.

  Race 1, start 14:00:00 — both sail 1:00:00 elapsed (3600 s):
    Optique TCC 1.000            CT 3600.0 → tie 1st
    Zelus   TCC 1.000 (override) CT 3600.0 → tie 1st
  Identical corrected times share rank 1 (RRS A8 averaged: 1.5 each).

  Race 2, start 14:00:00:
    Optique finish 15:00:00  ET 3600  TCC 1.000           CT 3600.0 → 2nd
    Zelus   finish 15:05:00  ET 3900  TCC 0.900 (current)  CT 3510.0 → 1st
  Without the race-1 override Zelus would score on 0.900 there too
  (CT 3900 × 0.9 = 3510 ≠ 3600) — the override is what reproduces race 1.

series:
  discardThresholds: []

fleet:
  scoringSystem: vprs

competitors:
  - { sailNumber: "IRL1725", name: "Optique", vprsTcc: 1.0 }
  - { sailNumber: "IRL1540", name: "Zelus", vprsTcc: 0.9 }   # current (race 2) rating

races:
  - number: 1
    startTime: "14:00:00"
    ratingOverrides:
      - { sailor: "IRL1540", field: vprsTcc, value: 1.0 }    # old certificate
    finishes:
      - { sailor: "IRL1725", finishTime: "15:00:00" }
      - { sailor: "IRL1540", finishTime: "15:00:00" }
  - number: 2
    startTime: "14:00:00"
    finishes:
      - { sailor: "IRL1540", finishTime: "15:05:00" }
      - { sailor: "IRL1725", finishTime: "15:00:00" }

# Points:
#   Optique: race1 1.5 (tie), race2 2  → total 3.5
#   Zelus:   race1 1.5 (tie), race2 1  → total 2.5  (rank 1)
expected:
  standings:
    - rank: 1
      sailor: "IRL1540"
      racePoints: [1.5, 1]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 2.5
      netPoints: 2.5
    - rank: 2
      sailor: "IRL1725"
      racePoints: [1.5, 2]
      raceCodes: [null, null]
      raceDiscards: [false, false]
      totalPoints: 3.5
      netPoints: 3.5
