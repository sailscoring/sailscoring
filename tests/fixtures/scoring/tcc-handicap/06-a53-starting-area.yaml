description: "IRC under A5.3 — DNF uses starters+1, DNC keeps entries+1"
rrs_notes: "RRS A5.3 is the alternative penalty rule: codes whose penalty base is 'starters' (DNF, DNS, OCS, RET, DSQ…) score the number of boats that came to the starting area + 1 instead of series entries + 1. Codes whose base is 'entries' (DNC, BFD) are unaffected. The setting applies equally to scratch and handicap fleets."

# Fleet size = 5 (entries-base penalty = 6).
# Check-in data is recorded (startPresent set on every row).
# Boats present at the line: 1, 2, 3, 4 → starters = 4 (starters-base penalty = 5).
# E (Echo) was absent → DNC.
#
# Start 14:00:00
#
# Boat 1 (TCC 1.0): finish 14:50:00  ET = 3000  CT = 3000.0  → 1st  (1 pt)
# Boat 2 (TCC 1.0): finish 15:00:00  ET = 3600  CT = 3600.0  → 2nd  (2 pt)
# Boat 3 (TCC 1.0): finish 15:10:00  ET = 4200  CT = 4200.0  → 3rd  (3 pt)
# Boat 4 (TCC 1.0): DNF                                       → 5 pt (starters+1, A5.3)
# Boat 5 (TCC 1.0): DNC                                       → 6 pt (entries+1, unchanged)

series:
  discardThresholds: []
  dnfScoring: startingArea

fleet:
  scoringSystem: irc

competitors:
  - sailNumber: "1"
    name: "Alpha"
    ircTcc: 1.0
  - sailNumber: "2"
    name: "Bravo"
    ircTcc: 1.0
  - sailNumber: "3"
    name: "Charlie"
    ircTcc: 1.0
  - sailNumber: "4"
    name: "Delta"
    ircTcc: 1.0
  - sailNumber: "5"
    name: "Echo"
    ircTcc: 1.0

races:
  - number: 1
    startTime: "14:00:00"
    finishes:
      - sailor: "1"
        finishTime: "14:50:00"
        startPresent: true
      - sailor: "2"
        finishTime: "15:00:00"
        startPresent: true
      - sailor: "3"
        finishTime: "15:10:00"
        startPresent: true
      - sailor: "4"
        code: "DNF"
        startPresent: true
      - sailor: "5"
        code: "DNC"
        startPresent: false
    expected:
      - sailor: "1"
        rank: 1
        points: 1.0
        elapsedTime: 3000
        correctedTime: 3000.0
        tcfApplied: 1.0
      - sailor: "2"
        rank: 2
        points: 2.0
        elapsedTime: 3600
        correctedTime: 3600.0
        tcfApplied: 1.0
      - sailor: "3"
        rank: 3
        points: 3.0
        elapsedTime: 4200
        correctedTime: 4200.0
        tcfApplied: 1.0
      - sailor: "4"
        rank: null
