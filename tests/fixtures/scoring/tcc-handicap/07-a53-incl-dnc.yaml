description: "IRC under A5.3 with DNC from the starting area (DBSC SI A13.2)"
rrs_notes: "DBSC Sailing Instruction A13.2 changes RRS A5.3 so a boat that did not come to the starting area (DNC) is scored the number of boats that came to the starting area + 1, the same base as DNF/RET/etc. This is the 'startingAreaInclDnc' mode. Here four boats come to the start and finish; the absent boat is scored starters + 1 = 5, not series entries + 1 = 6."

# Fleet size = 5 (entries-base penalty = 6).
# Boats 1-4 come to the start and finish → starters = 4 (starters-base penalty = 5).
# Boat 5 (Echo) was absent → DNC = starters + 1 = 5 (not 6).
#
# Start 14:00:00
#
# Boat 1 (TCC 1.0): finish 14:50:00  ET = 3000  CT = 3000.0  → 1st  (1 pt)
# Boat 2 (TCC 1.0): finish 15:00:00  ET = 3600  CT = 3600.0  → 2nd  (2 pt)
# Boat 3 (TCC 1.0): finish 15:10:00  ET = 4200  CT = 4200.0  → 3rd  (3 pt)
# Boat 4 (TCC 1.0): finish 15:20:00  ET = 4800  CT = 4800.0  → 4th  (4 pt)
# Boat 5 (TCC 1.0): DNC                                       → 5 pt (came + 1, DBSC A13.2)

series:
  discardThresholds: []
  dnfScoring: startingAreaInclDnc

fleet:
  scoringSystem: irc

competitors:
  - sailNumber: "1"
    name: "Alpha"
    ircTcc: 1.0
  - sailNumber: "2"
