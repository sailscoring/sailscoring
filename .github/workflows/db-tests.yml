name: DB Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  db:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sailscoring
          POSTGRES_PASSWORD: sailscoring
          POSTGRES_DB: sailscoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sailscoring"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://sailscoring:sailscoring@localhost:5432/sailscoring
      BETTER_AUTH_SECRET: ci-secret-do-not-use-in-prod-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BILGE_URL: https://bilge.sailscoring.ie

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Apply Drizzle migrations
        run: pnpm db:migrate

      - name: Run schema- and repository-level Vitest suites
        run: pnpm test:unit tests/db tests/postgres-repository.test.ts

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run @auth e2e tests (sign-in + /api/health smoke)
        run: pnpm run test:e2e --grep "@auth"
